  <button class="btn js-toggle-dark-mode theme-toggle" type="button">🌙 다크 모드</button>
</div>
<script>
  (function() {
    var KEY = "hyunbenny-theme";
    var btn = document.querySelector(".js-toggle-dark-mode");
    function apply(theme) {
      if (window.jtd && jtd.setTheme) { jtd.setTheme(theme); }
      btn.textContent = theme === "hyunbenny-dark" ? "☀️ 라이트 모드" : "🌙 다크 모드";
    }
    var saved = localStorage.getItem(KEY);
    apply(saved === "hyunbenny-dark" ? "hyunbenny-dark" : "hyunbenny");
    btn.addEventListener("click", function() {
      var next = (localStorage.getItem(KEY) === "hyunbenny-dark") ? "hyunbenny" : "hyunbenny-dark";
      localStorage.setItem(KEY, next);
      apply(next);
    });
  })();
</script>
